<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROM Forge Hub - Animated Fire Preview</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#08080b; color:#d8d2c4;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif; }
  header { padding:16px 22px; border-bottom:1px solid #20201a; display:flex; gap:16px; align-items:baseline; flex-wrap:wrap; }
  header h1 { margin:0; font-size:16px; color:#ffd75f; letter-spacing:.04em; }
  header .sub { color:#857f74; font-size:13px; }
  .wrap { display:grid; grid-template-columns:230px 1fr; gap:16px; padding:16px; align-items:start; }
  @media (max-width:820px){ .wrap{ grid-template-columns:1fr; } }
  .rail { display:flex; flex-direction:column; gap:14px; }
  .ctl { background:#121210; border:1px solid #2a2820; border-radius:9px; padding:11px 12px; }
  .ctl label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:#7a7468; margin-bottom:7px; }
  .ctl input[type=range]{ width:100%; }
  .ctl .val { color:#ffe79a; font-size:12px; float:right; }
  .btn { cursor:pointer; border:1px solid #2a2820; background:#16140f; color:#d8cdb6; border-radius:8px; padding:8px 12px; font-size:13px; width:100%; }
  .btn.on { border-color:#c8912f; color:#ffe79a; background:#1c1810; }
  .row { display:flex; gap:8px; }
  .term { border-radius:10px; overflow:hidden; border:1px solid #2a2820; box-shadow:0 18px 50px -20px #000; background:#000; }
  .bar { display:flex; align-items:center; gap:8px; padding:8px 12px; background:#141009; border-bottom:1px solid #20201a; color:#857f74; font-size:12px; }
  .dot { width:11px; height:11px; border-radius:50%; }
  pre.screen { margin:0; padding:14px 16px; background:#000; overflow-x:auto;
    font-family:"SF Mono","Menlo","DejaVu Sans Mono",monospace; font-size:14px; line-height:1.0; white-space:pre; }
  .promptbar { display:flex; gap:10px; margin-top:12px; background:#121210; border:1px solid #2a2820; border-radius:10px; padding:12px 14px; }
  .promptbar .txt { flex:1; font-size:13px; line-height:1.45; } .promptbar code{ color:#ffe79a; }
  .copy { cursor:pointer; border:1px solid #c8912f; background:#1c1810; color:#ffe79a; padding:8px 16px; border-radius:8px; align-self:center; white-space:nowrap; }
  .stage { min-width:0; }
</style>
</head>
<body>
<header>
  <h1>ROM Forge &mdash; Animated Hub Preview</h1>
  <span class="sub">ROM FORGE filled with scrolling library words, over a hellfire anvil. Ports to curses.</span>
</header>
<div class="wrap">
  <div class="rail">
    <div class="ctl"><label>Flame height / intensity <span class="val" id="vInt">5</span></label>
      <input type="range" id="intensity" min="1" max="9" value="5"></div>
    <div class="ctl"><label>Wind <span class="val" id="vWind">0</span></label>
      <input type="range" id="wind" min="-3" max="3" value="0"></div>
    <div class="ctl"><label>Speed (fps) <span class="val" id="vFps">22</span></label>
      <input type="range" id="fps" min="8" max="30" value="22"></div>
    <button class="btn on" id="embers">Embers / Sparks: On</button>
    <div class="row"><button class="btn" id="pause">Pause</button>
      <button class="btn" id="palette">Palette: Lava</button></div>
  </div>
  <div class="stage">
    <div class="term">
      <div class="bar"><span class="dot" style="background:#ff5f56"></span>
        <span class="dot" style="background:#ffbd2e"></span>
        <span class="dot" style="background:#27c93f"></span>
        <span style="margin-left:6px">forge &mdash; hub</span></div>
      <pre class="screen" id="screen"></pre>
    </div>
    <div class="promptbar"><div class="txt" id="ptxt"></div>
      <button class="copy" id="copy">Copy pick</button></div>
  </div>
</div>
<script>
const DATA = {"wordmark": ["██████   ██████  ███    ███", "██   ██ ██    ██ ████  ████", "██████  ██    ██ ██ ████ ██", "██   ██ ██    ██ ██  ██  ██", "██   ██  ██████  ██      ██", "", "███████  ██████  ██████   ██████  ███████", "██      ██    ██ ██   ██ ██       ██", "█████   ██    ██ ██████  ██   ███ █████", "██      ██    ██ ██   ██ ██    ██ ██", "██       ██████  ██   ██  ██████  ███████"], "anvil": ["       ████████████████", "    ████████████████████████", "    ████████████████████████", "     ████████████████████", "          ██████████", "          ██████████", "        ████████████████", "    ████████████████████████", "    ████████████████████████"], "stream": "SUPER MARIO   ZELDA   METROID   KIRBY   DONKEY KONG   STAR FOX   POKEMON   FIRE EMBLEM   FINAL FANTASY   CHRONO TRIGGER   DRAGON QUEST   CASTLEVANIA   MEGA MAN   CONTRA   SONIC   STREETS OF RAGE   GOLDEN AXE   PHANTASY STAR   SHINING FORCE   EARTHBOUND   SECRET OF MANA   METAL SLUG   STREET FIGHTER   KING OF FIGHTERS   GHOULS N GHOSTS   BOMBERMAN   NES   SNES   N64   GAME BOY   GBA   GENESIS   DREAMCAST   SATURN   PSX   NEO GEO   TURBOGRAFX   "};
const W = 64;

const GOLD="#ffd75f", GOLDDK="#c79a33", MUT="#9a948a", BORD="#c8912f";
let frameCount=0;
function lerpHex(a,b,t){ const A=[1,3,5].map(k=>parseInt(a.slice(k,k+2),16));
  const B=[1,3,5].map(k=>parseInt(b.slice(k,k+2),16));
  const c=A.map((v,k)=>Math.round(v+(B[k]-v)*t)); return `rgb(${c[0]},${c[1]},${c[2]})`; }
function emberPulse(){ return lerpHex("#d2560f","#ffd86a",(Math.sin(frameCount*0.16)+1)/2); }
function whiteHot(){ return lerpHex("#ff8c1a","#fff3d6",(Math.sin(frameCount*0.33)+1)/2); }

function centerBlock(lines){ const w=Math.max(...lines.map(l=>[...l].length));
  const left=Math.max(0,Math.floor((W-w)/2)); return lines.map(l=>" ".repeat(left)+l); }

// ---- overlay (opaque foreground the fire can't paint over) ----
const overlay=[];
function put(rowsText, fn){
  centerBlock(rowsText).forEach((line,i)=>{
    const chars=[...line], r=[];
    for(let x=0;x<W;x++){ const ch=chars[x]||" ";
      if(ch===" "){ r.push(null); continue; }
      r.push({ch, ...fn(ch,i,x)}); }
    overlay.push(r);
  });
}
function blank(n){ for(let k=0;k<n;k++) overlay.push(new Array(W).fill(null)); }

// Embossed crafted-metal wordmark: molten gradient face + top-left bevel
// highlight + bottom-right edge shadow, a solid drop-shadow, and a dark halo
// outline that masks the fire so the letters pop.
function buildWordmark(){
  const lines=centerBlock(DATA.wordmark);
  const Hh=lines.length, gridH=Hh+1;
  const cells=lines.map(l=>[...l]);
  const isL=(r,c)=> r>=0&&r<Hh&&c>=0&&c<W && cells[r] && cells[r][c] && cells[r][c]!==" ";
  const grid=Array.from({length:gridH},()=>new Array(W).fill(null));
  for(let r=0;r<Hh;r++) for(let c=0;c<W;c++){ if(!isL(r,c)) continue;
    grid[r][c]={dyn:"wm", r, c, Hh};   // letter area: filled with scrolling library words (per-frame)
  }
  for(let r=0;r<Hh;r++) for(let c=0;c<W;c++){ if(!isL(r,c)) continue;   // solid drop shadow +1,+1
    const sr=r+1, sc=c+1;
    if(sr<gridH && sc<W && !grid[sr][sc] && !isL(sr,sc)) grid[sr][sc]={ch:"█",color:"#100a02"};
  }
  for(let r=0;r<gridH;r++) for(let c=0;c<W;c++){ if(grid[r][c]) continue;   // dark halo outline
    let near=false;
    for(let dr=-1;dr<=1&&!near;dr++) for(let dc=-1;dc<=1;dc++){ if(isL(r+dr,c+dc)){near=true;break;} }
    if(near) grid[r][c]={ch:"█",color:"#080502"};
  }
  for(let r=0;r<gridH;r++) overlay.push(grid[r]);
}
blank(1);
buildWordmark();
blank(2);
const ANVIL_TOP_Y=overlay.length;
const ANVIL_CX=Math.floor(W/2);
const ANVIL_ROWS=DATA.anvil.length;
put(DATA.anvil,(ch,i,x)=>({dyn:"anvil", i, x}));
// Dark outline halo around the anvil so it pops off the fire (matches the
// wordmark treatment for a cohesive look).
(function haloSolids(){
  const hits=[];
  for(let y=0;y<overlay.length;y++) for(let x=0;x<W;x++){
    if(overlay[y][x]) continue;
    let near=false;
    for(let dy=-1;dy<=1&&!near;dy++) for(let dx=-1;dx<=1;dx++){
      const ny=y+dy, nx=x+dx;
      if(ny>=0&&ny<overlay.length&&nx>=0&&nx<W){ const c=overlay[ny][nx];
        if(c&&c.dyn==="anvil"){ near=true; break; } }
    }
    if(near) hits.push([y,x]);
  }
  for(const [y,x] of hits) overlay[y][x]={ch:"█",color:"#080502"};
})();
const H=overlay.length;

// dynamic (per-frame) overlay colors
const STREAM = DATA.stream;
function wmCell(cell){
  // scrolling library words clipped to the letter shape; burnt-orange/gold/bronze
  const off=Math.floor(frameCount/3), len=STREAM.length;
  let idx=(((cell.c+off+cell.r*17)%len)+len)%len;
  let ch=STREAM[idx];
  const t=cell.Hh>1? cell.r/(cell.Hh-1):0;
  let color=t<0.5? lerpHex("#a86a26","#e6b23a",t/0.5) : lerpHex("#e6b23a","#d2611a",(t-0.5)/0.5);
  if(ch===" "){ ch="░"; color=lerpHex(color,"#180f04",0.58); }   // dim textured gap keeps letters solid
  return {ch,color};
}
function anvilColor(i,x,ch){
  const last=ANVIL_ROWS-1;
  const flick=(Math.sin(frameCount*0.22 + x*0.6 + i*0.45)+1)/2;
  if(i<=1) return lerpHex("#9aa1ab","#cdd4dd", 0.5);         // top steel rim-highlight (pops vs black)
  if(i>=last-1) return lerpHex("#7a2c0a","#ffbe55", 0.5+0.5*flick); // base: flame reflection
  let w=Math.pow(i/last,1.25);                               // keep the upper body cool
  const blend=Math.min(0.8, w*(0.6+0.4*flick));
  const steel=(x<W/2-1)?"#3a4047":"#2a2f35";
  return lerpHex(steel,"#e07a18",blend);                    // cool steel -> warm reflection
}
function resolveColor(cell){
  if(cell.dyn==="anvil") return anvilColor(cell.i, cell.x, cell.ch);
  return cell.color;
}

// ---- fire field ----
const fire=new Int16Array(W*H); const MAX=36;
for(let x=0;x<W;x++) fire[(H-1)*W+x]=MAX;
let wind=0,intensity=5,embersOn=true,paused=false,fps=22,paletteName="Lava";
function buildPalette(){
  // Diablo II hellfire: blood-red base -> ember -> antique gold tips (darker, redder).
  const lava=[[0," ","#000000"],[3,".","#220402"],[6,".","#420804"],[9,":","#671006"],
    [12,",","#8c1808"],[15,"*","#b3260c"],[18,"*","#d33e0e"],[21,"▒","#e65a12"],
    [25,"▓","#ef7a18"],[29,"▓","#e89a2c"],[32,"█","#d8a83a"],[34,"█","#e8c860"],[36,"█","#f6e6a8"]];
  const ember=[[0," ","#000000"],[4,".","#241a06"],[9,":","#5a3a08"],[14,"*","#8a5a0c"],
    [19,"▒","#b8800f"],[24,"▓","#e0a81a"],[29,"▓","#ffc83e"],[33,"█","#ffe06a"],[36,"█","#fff3cf"]];
  const stops=paletteName==="Lava"?lava:ember; const pal=[];
  for(let v=0;v<=MAX;v++){ let s=stops[0]; for(const st of stops){ if(v>=st[0]) s=st; } pal[v]={ch:s[1],color:s[2]}; }
  return pal;
}
let PAL=buildPalette();
function step(){
  for(let x=0;x<W;x++) for(let y=1;y<H;y++){
    const below=fire[y*W+x]; const decay=(Math.random()*3)|0;
    const cool=decay&1?1:0; const extra=(Math.random()*(10-intensity)/3)|0;
    let nx=x-decay+1+wind; if(nx<0)nx=0; if(nx>=W)nx=W-1;
    fire[(y-1)*W+nx]=Math.max(0,below-cool-extra);
  }
  for(let x=0;x<W;x++) fire[(H-1)*W+x]=MAX-((Math.random()*4)|0);
}

// sparks: rising embers + hammer-strike bursts off the anvil face
let sparks=[], hammer=0;
function spawn(){
  if(!embersOn) return;
  if(Math.random()<0.5) sparks.push({x:Math.random()*W,y:H-2,vy:-(0.25+Math.random()*0.5),
    vx:(Math.random()-0.5)*0.6+wind*0.25,life:14+Math.random()*16,hot:false});
  hammer++;
  if(hammer>13){ hammer=-((Math.random()*8)|0);
    const n=4+((Math.random()*4)|0);
    for(let k=0;k<n;k++) sparks.push({x:ANVIL_CX+(Math.random()-0.5)*8,y:ANVIL_TOP_Y+1,
      vy:-(0.5+Math.random()*0.8),vx:(Math.random()-0.5)*1.6,life:9+Math.random()*9,hot:true});
  }
}
function moveSparks(){ for(const s of sparks){ s.y+=s.vy; s.x+=s.vx; s.vy+=0.03; s.life--; }
  sparks=sparks.filter(s=>s.life>0&&s.y>0&&s.x>=0&&s.x<W); }
function sparkAt(x,y){ for(const s of sparks){ if(Math.round(s.x)===x&&Math.round(s.y)===y){
  const t=s.life; const ch=t>18?"·":(t>9?"*":"+");
  const color=s.hot?(t>12?"#fff3d6":"#ffd24a"):(t>18?"#fff3cf":(t>9?"#ffd24a":"#ff8c1a"));
  return {ch,color}; } } return null; }

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function span(s,c){ return `<span style="color:${c}">${esc(s)}</span>`; }
function render(){
  let out=span("╔"+"═".repeat(W)+"╗",BORD)+"\n";
  for(let y=0;y<H;y++){
    let line="║",buf="",cur=null;
    const flush=()=>{ if(buf){ line+=`<span style="color:${cur}">${esc(buf)}</span>`; buf=""; } };
    for(let x=0;x<W;x++){
      let cell=overlay[y][x], cc;
      if(cell){
        if(cell.dyn==="wm"){ cell=wmCell(cell); cc=cell.color; }
        else cc=resolveColor(cell);
      }
      else { const sp=sparkAt(x,y); if(sp){ cell=sp; cc=sp.color; }
        else { const v=fire[y*W+x]; cell=v>0?PAL[v]:{ch:" ",color:null}; cc=cell.color; } }
      if(cc!==cur){ flush(); cur=cc; }
      buf+=cell.ch;
    }
    flush(); line+="║"; out+=line+"\n";
  }
  out+=span("╟"+"─".repeat(W)+"╢",BORD)+"\n";
  out+="║"+span("   TIGER0295      Apprentice      Forging Lv 1".padEnd(W).slice(0,W),MUT)+"║\n";
  out+=span("╚"+"═".repeat(W)+"╝",BORD)+"\n\n";
  const items=["LIBRARY","STATS","DIARIES","DEVICES","QUIT"];
  out+=span("╔"+"═".repeat(W)+"╗",BORD)+"\n";
  out+="║"+span("   FORGE HUB".padEnd(W).slice(0,W),GOLD)+"║\n";
  out+=span("╟"+"─".repeat(W)+"╢",BORD)+"\n";
  items.forEach((it,i)=>{ const sel=i===0;
    if(sel){ const rest=("LIBRARY"+" ".repeat(W)).slice(0,W-6);
      out+="║"+span("   ",GOLD)+span(">> ",  "#c0301a")+span(rest,"#ffd75f")+"║\n"; }
    else out+="║"+span(("      "+it).padEnd(W).slice(0,W),"#cdbf9a")+"║\n"; });
  out+=span("╟"+"─".repeat(W)+"╢",BORD)+"\n";
  out+="║"+span("   up/down move   enter select   esc back   q quit".padEnd(W).slice(0,W),MUT)+"║\n";
  out+=span("╚"+"═".repeat(W)+"╝",BORD);
  document.getElementById("screen").innerHTML=out;
}

let timer=null;
function frame(){ frameCount++; if(!paused){ step(); spawn(); moveSparks(); } render(); }
function restart(){ if(timer) clearInterval(timer); timer=setInterval(frame,1000/fps); }
restart();

const $=id=>document.getElementById(id);
$("intensity").oninput=e=>{ intensity=+e.target.value; $("vInt").textContent=intensity; updP(); };
$("wind").oninput=e=>{ wind=+e.target.value; $("vWind").textContent=wind; updP(); };
$("fps").oninput=e=>{ fps=+e.target.value; $("vFps").textContent=fps; restart(); updP(); };
$("embers").onclick=()=>{ embersOn=!embersOn; $("embers").classList.toggle("on",embersOn);
  $("embers").textContent="Embers / Sparks: "+(embersOn?"On":"Off"); updP(); };
$("pause").onclick=()=>{ paused=!paused; $("pause").classList.toggle("on",paused);
  $("pause").textContent=paused?"Play":"Pause"; };
$("palette").onclick=()=>{ paletteName=paletteName==="Lava"?"Ember":"Lava"; PAL=buildPalette();
  $("palette").textContent="Palette: "+paletteName; updP(); };
function updP(){ $("ptxt").innerHTML=
  `Build the forge hub: <code>ANSI Shadow ROM FORGE</code> + an N64 cartridge forged on a flame-lit anvil over an animated `+
  `<code>Doom-fire</code> background (palette ${paletteName}, intensity ${intensity}, wind ${wind}, embers ${embersOn?"on":"off"}, ~${fps}fps) `+
  `in ui/hub.py with curses color pairs + a non-blocking redraw loop. No tagline.`; }
$("copy").onclick=()=>{ navigator.clipboard.writeText($("ptxt").textContent).then(()=>{
  const b=$("copy"); b.textContent="Copied!"; setTimeout(()=>b.textContent="Copy pick",1200); }); };
updP();
</script>
</body>
</html>
